<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a2a4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid lines (blueprint style) -->
  <g opacity="0.08" stroke="#4488cc" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Decorative nav graph elements -->
  <g opacity="0.15">
    <!-- Lanes -->
    <line x1="100" y1="200" x2="300" y2="200" stroke="#3b82f6" stroke-width="3"/>
    <line x1="300" y1="200" x2="300" y2="400" stroke="#3b82f6" stroke-width="3"/>
    <line x1="300" y1="400" x2="500" y2="400" stroke="#f59e0b" stroke-width="3"/>
    <line x1="900" y1="150" x2="1100" y2="150" stroke="#3b82f6" stroke-width="3"/>
    <line x1="1100" y1="150" x2="1100" y2="350" stroke="#3b82f6" stroke-width="3"/>
    <line x1="1100" y1="350" x2="1200" y2="500" stroke="#f59e0b" stroke-width="3"/>
    <!-- Waypoints -->
    <circle cx="100" cy="200" r="5" fill="#22c55e"/>
    <circle cx="300" cy="200" r="5" fill="#3b82f6"/>
    <circle cx="300" cy="400" r="5" fill="#3b82f6"/>
    <circle cx="500" cy="400" r="5" fill="#eab308"/>
    <circle cx="900" cy="150" r="5" fill="#22c55e"/>
    <circle cx="1100" cy="150" r="5" fill="#3b82f6"/>
    <circle cx="1100" cy="350" r="5" fill="#3b82f6"/>
    <circle cx="1200" cy="500" r="5" fill="#a855f7"/>
  </g>

  <!-- Room outline -->
  <g opacity="0.1" stroke="#6699cc" stroke-width="2" fill="none">
    <rect x="150" y="350" width="200" height="150" rx="2"/>
    <rect x="850" y="380" width="250" height="180" rx="2"/>
  </g>

  <!-- Title -->
  <text x="640" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white">
    RMF Site Editor
  </text>

  <!-- Subtitle -->
  <text x="640" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8">
    Visual editor for robot fleet management sites
  </text>

  <!-- Tech badges -->
  <g transform="translate(640, 380)" text-anchor="middle">
    <g transform="translate(-200, 0)">
      <rect x="-45" y="-14" width="90" height="28" rx="14" fill="#3b82f6" opacity="0.3"/>
      <text y="6" font-family="system-ui, sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle">Rust</text>
    </g>
    <g transform="translate(-70, 0)">
      <rect x="-45" y="-14" width="90" height="28" rx="14" fill="#3b82f6" opacity="0.3"/>
      <text y="6" font-family="system-ui, sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle">Bevy</text>
    </g>
    <g transform="translate(60, 0)">
      <rect x="-45" y="-14" width="90" height="28" rx="14" fill="#3b82f6" opacity="0.3"/>
      <text y="6" font-family="system-ui, sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle">SDF</text>
    </g>
    <g transform="translate(190, 0)">
      <rect x="-50" y="-14" width="100" height="28" rx="14" fill="#3b82f6" opacity="0.3"/>
      <text y="6" font-family="system-ui, sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle">ROS 2</text>
    </g>
  </g>

  <!-- Bottom accent line -->
  <rect x="440" y="600" width="400" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>
